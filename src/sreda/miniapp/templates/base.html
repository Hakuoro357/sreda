<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{% block title %}Подписки{% endblock %} — Среда</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--tg-theme-hint-color, #999);
      margin: 20px 0 8px 4px;
    }

    .card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: default;
    }

    .card-link {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
    }

    .card-link:active {
      opacity: 0.7;
    }

    .card-link .chevron {
      color: var(--tg-theme-hint-color, #999);
      font-size: 18px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
    }

    .status-active { color: #34c759; }
    .status-warning { color: #ff9500; }
    .status-inactive { color: var(--tg-theme-hint-color, #999); }
    .status-dot { font-size: 10px; vertical-align: middle; margin-left: 4px; }

    .banner {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
    }

    .banner strong {
      color: var(--tg-theme-text-color, #000);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--tg-theme-button-color, #007aff);
      color: var(--tg-theme-button-text-color, #fff);
    }

    .btn-danger {
      background: none;
      color: var(--tg-theme-destructive-text-color, #e53935);
      padding: 8px 0;
      font-size: 14px;
    }

    .btn-success {
      background: none;
      color: #34c759;
      padding: 8px 0;
      font-size: 14px;
    }

    .btn-small {
      display: inline-block;
      width: auto;
      padding: 6px 14px;
      font-size: 13px;
    }

    /* EDS account nested card */
    .eds-account {
      background: var(--tg-theme-bg-color, #fff);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .eds-account-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .eds-account-login {
      font-size: 14px;
      font-weight: 500;
    }

    .eds-account-status {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
      margin-top: 2px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--tg-theme-secondary-bg-color, #e0e0e0);
      border-top-color: var(--tg-theme-button-color, #007aff);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Inline spinner used inside buttons (e.g. menu-regen-btn while
       the LLM suggestion is in flight). Same animation, smaller size,
       vertical-aligned so it sits in the button centre. */
    .spinner-small {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, 0.15);
      border-top-color: var(--tg-theme-text-color, #000);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--tg-theme-hint-color, #999);
      font-size: 14px;
    }

    .error-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--tg-theme-destructive-text-color, #e53935);
      font-size: 14px;
    }

    .price {
      font-size: 15px;
      font-weight: 600;
    }

    .price-large {
      font-size: 24px;
      font-weight: 700;
      margin: 16px 0;
    }

    .description {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
      line-height: 1.4;
      margin: 8px 0 16px;
    }

    .text-right { text-align: right; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mb-8 { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
