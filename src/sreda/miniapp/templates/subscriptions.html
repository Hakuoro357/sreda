{% extends "base.html" %}

{% block scripts %}
<script>
(function() {
  "use strict";

  var BUILD_STAMP = "{{ build_stamp }}";
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  var initData = tg ? tg.initData : "";
  var $app = document.getElementById("app");

  // Always ping the server once on load with what the client sees — we
  // want server-side confirmation that JS actually ran, what TG reported
  // and which build the client got. This is unauth'd — just diagnostics.
  function _postDiag(reason) {
    try {
      fetch("{{ base_url }}/miniapp/api/v1/client-diagnostic", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          reason: reason,
          build: BUILD_STAMP,
          has_tg: !!tg,
          init_data_len: initData ? initData.length : 0,
          ua: navigator.userAgent,
        }),
        keepalive: true,
      });
    } catch (e) {}
  }
  _postDiag("page_load");

  // If initData is missing (e.g. page opened in a plain browser or via
  // a shared link outside the Telegram client), server-side auth is
  // impossible. Show a clear, VERY visible message instead of firing
  // requests that will all 401 and leave the user staring at a white
  // screen. Inline styles so we don't depend on theme vars.
  if (!initData) {
    var msg = !tg
      ? "Это приложение открывается только внутри Telegram."
      : "Не удалось получить данные Telegram. Закройте и откройте приложение через кнопку в чате бота.";
    console.warn("miniapp: initData missing", {hasTg: !!tg, ua: navigator.userAgent});
    if ($app) {
      $app.innerHTML =
        '<div style="margin:16px;padding:24px;background:#ffeaea;' +
        'border:1px solid #e57373;border-radius:12px;color:#000;">' +
        '<h2 style="margin:0 0 12px 0;font-size:18px;color:#b71c1c;">Не удалось открыть</h2>' +
        '<p style="margin:0 0 12px 0;line-height:1.4;">' + msg + '</p>' +
        '<p style="margin:0;font-size:11px;color:#777;">build ' + BUILD_STAMP + '</p>' +
        '</div>';
    }
    _postDiag("no_init_data");
    return;
  }

  // -- State --
  // ``menu`` — dashboard tiles (skills + Подписки). ``reminders`` lazy-loaded
  // when the user opens #/reminders so we don't hit the DB on every boot.
  var state = {
    summary: null,
    plans: null,
    menu: null,
    reminders: null,
    shopping: null,
    recipes: null,
    recipeDetail: {},
    weeklyMenu: null,
    family: null,
    loading: true,
    error: null,
  };

  // -- API --
  function apiFetch(path, opts) {
    opts = opts || {};
    var headers = { "Authorization": "tma " + initData };
    if (opts.body) headers["Content-Type"] = "application/json";
    return fetch("{{ base_url }}" + path, {
      method: opts.method || "GET",
      headers: headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    }).then(function(r) {
      if (r.status === 401) {
        state.error = "Сессия истекла. Закройте и откройте подписки заново.";
        render();
        throw new Error("auth_expired");
      }
      return r.json();
    });
  }

  // loadData supports a silent mode used by the visibility-refresh path:
  // we don't null state before the fetch and we don't set state.loading
  // (which would replace the dashboard with a spinner for 200–500ms).
  // Instead we keep the old data visible, fetch in the background, and
  // only re-render when fresh data has overwritten the slots. Without
  // this, tapping a dashboard card (e.g. "Меню недели") right after
  // the Mini App becomes visible ate into the loading placeholder and
  // the user had to tap twice.
  function loadData(opts) {
    var silent = !!(opts && opts.silent);
    if (!silent) {
      state.loading = true;
      state.error = null;
      render();
    }
    return Promise.all([
      apiFetch("/miniapp/api/v1/summary"),
      apiFetch("/miniapp/api/v1/plans"),
      apiFetch("/miniapp/api/v1/menu"),
    ]).then(function(results) {
      state.summary = results[0];
      state.plans = results[1];
      state.menu = results[2];
      state.loading = false;
      render();
    }).catch(function(err) {
      if (err.message !== "auth_expired") {
        state.loading = false;
        if (!silent) state.error = "Не удалось загрузить данные.";
        render();
      }
    });
  }

  function loadReminders() {
    return apiFetch("/miniapp/api/v1/reminders").then(function(res) {
      state.reminders = res;
      render();
    }).catch(function(err) {
      if (err.message !== "auth_expired") {
        state.reminders = { items: [], _error: true };
        render();
      }
    });
  }

  function loadShopping() {
    return apiFetch("/miniapp/api/v1/shopping").then(function(res) {
      state.shopping = res;
      render();
    }).catch(function(err) {
      if (err.message !== "auth_expired") {
        state.shopping = { items: [], _error: true };
        render();
      }
    });
  }

  function loadRecipes() {
    return apiFetch("/miniapp/api/v1/recipes").then(function(res) {
      state.recipes = res;
      render();
    }).catch(function(err) {
      if (err.message !== "auth_expired") {
        state.recipes = { items: [], _error: true };
        render();
      }
    });
  }

  function loadRecipeDetail(recipeId) {
    return apiFetch("/miniapp/api/v1/recipes/" + recipeId).then(function(res) {
      state.recipeDetail[recipeId] = res.recipe;
      render();
    }).catch(function(err) {
      if (err.message !== "auth_expired") {
        state.recipeDetail[recipeId] = { _error: true };
        render();
      }
    });
  }

  function loadWeeklyMenu() {
    return apiFetch("/miniapp/api/v1/weekly-menu").then(function(res) {
      state.weeklyMenu = res;
      render();
    }).catch(function(err) {
      if (err.message !== "auth_expired") {
        state.weeklyMenu = { plan: null, _error: true };
        render();
      }
    });
  }

  function loadFamily() {
    return apiFetch("/miniapp/api/v1/family").then(function(res) {
      state.family = res;
      render();
    }).catch(function(err) {
      if (err.message !== "auth_expired") {
        state.family = { items: [], _error: true };
        render();
      }
    });
  }

  function doAction(path, body) {
    return apiFetch(path, { method: "POST", body: body || {} })
      .then(function(res) {
        if (res.summary) state.summary = res.summary;
        return res;
      })
      .then(function() { return loadData(); });
  }

  function showPopup(message, onOk) {
    if (tg && tg.showPopup) {
      // Buttons need explicit `id` — without it, the callback receives
      // an empty string for type:"ok" and we'd never trigger onOk().
      tg.showPopup(
        {
          message: message,
          buttons: [
            { id: "ok", type: "default", text: "Да" },
            { id: "cancel", type: "default", text: "Отмена" }
          ]
        },
        function(btn) { if (btn === "ok") onOk(); }
      );
    } else {
      if (confirm(message)) onOk();
    }
  }

  function showAlert(message) {
    if (tg && tg.showAlert) tg.showAlert(message);
    else alert(message);
  }

  // -- Routing --
  function getRoute() {
    var hash = location.hash || "#/";
    return hash.replace(/^#/, "") || "/";
  }

  function navigate(path) {
    location.hash = "#" + path;
  }

  // Telegram.WebApp.BackButton.onClick() SUBSCRIBES a new handler on
  // every call without replacing — after N navigations, one tap fires
  // all N handlers and history.back() runs N times, jumping past the
  // previous screen. Track the active callback and unsubscribe it
  // before installing a new one.
  var _backHandler = null;

  function setupBackButton(show) {
    if (!tg || !tg.BackButton) return;
    if (_backHandler) {
      try { tg.BackButton.offClick(_backHandler); } catch (e) {}
      _backHandler = null;
    }
    if (show) {
      _backHandler = function() {
        // On the main screen there's nothing to go back to — guard
        // against it even though setupBackButton(false) should keep
        // us out of this branch.
        if (getRoute() === "/") return;
        history.back();
      };
      tg.BackButton.onClick(_backHandler);
      tg.BackButton.show();
    } else {
      tg.BackButton.hide();
    }
  }

  // -- Helpers --
  function formatDate(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    var dd = String(d.getDate()).padStart(2, "0");
    var mm = String(d.getMonth() + 1).padStart(2, "0");
    var yyyy = d.getFullYear();
    return dd + "." + mm + "." + yyyy;
  }

  // Human-friendly datetime used on the reminders page. Today / tomorrow
  // get relative prefixes; further dates show day + month. Renders in
  // the device's locale so the Telegram user sees their own timezone.
  function formatDateTime(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    var now = new Date();
    var sameDay = d.toDateString() === now.toDateString();
    var tmrw = new Date(now.getTime() + 86400000);
    var isTomorrow = d.toDateString() === tmrw.toDateString();
    var timeStr = d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    if (sameDay) return "Сегодня в " + timeStr;
    if (isTomorrow) return "Завтра в " + timeStr;
    var dateStr = d.toLocaleDateString("ru-RU", { day: "numeric", month: "short" });
    return dateStr + ", " + timeStr;
  }

  function formatPrice(rub) {
    if (!rub || rub === 0) return "Бесплатно";
    return rub.toLocaleString("ru-RU") + " \u20bd / мес";
  }

  function escHtml(s) {
    if (!s) return "";
    var el = document.createElement("span");
    el.textContent = s;
    return el.innerHTML;
  }

  function findPlan(planKey) {
    if (!state.plans || !state.plans.plans) return null;
    for (var i = 0; i < state.plans.plans.length; i++) {
      if (state.plans.plans[i].plan_key === planKey) return state.plans.plans[i];
    }
    return null;
  }

  // -- Renderers --

  function renderLoading() {
    return '<div class="loading"><div class="spinner"></div></div>';
  }

  function renderError() {
    return '<div class="error-state">' + escHtml(state.error) + '</div>';
  }

  // --- Screen: Dashboard (#/) — dynamic menu from subscribed agents ---
  function renderDashboard() {
    setupBackButton(false);
    var html = '<h1>Среда</h1>';
    var items = (state.menu && state.menu.items) || [];
    if (items.length === 0) {
      // Should never happen — Подписки is always injected server-side,
      // but keep a graceful fallback.
      return html + '<div class="empty-state">Меню пустое. Попробуй обновить.</div>';
    }
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var route = it.route || "";
      // Route is a URL fragment like "#/reminders"; _nav expects a path.
      var path = route.replace(/^#/, "");
      html += '<div class="card card-link" onclick="window._nav(\'' + escHtml(path) + '\')">';
      html += '<div>';
      html += '<div class="card-title">' + escHtml(it.icon || "") + " " + escHtml(it.title) + '</div>';
      if (it.subtitle) {
        html += '<div class="card-subtitle">' + escHtml(it.subtitle) + '</div>';
      }
      html += '</div>';
      html += '<span class="chevron">\u203A</span>';
      html += '</div>';
    }
    return html;
  }

  // --- Screen: Subscriptions (#/subscriptions) — renamed from old main.
  // Same content: list of subscribed agents + payment banner + "+ Добавить".
  function renderSubscriptions() {
    setupBackButton(true);
    var s = state.summary;
    var html = '<h1>Мои подписки</h1>';

    // Payment banner
    if (s.next_payment_due_at && s.next_amount_rub > 0) {
      html += '<div class="banner">';
      html += 'Следующий платёж: <strong>' + formatDate(s.next_payment_due_at) + '</strong><br>';
      html += 'Сумма: <strong>' + s.next_amount_rub.toLocaleString("ru-RU") + ' \u20bd</strong>';
      html += '</div>';
    }

    // Active subscriptions
    var activeSkills = s.active_skills || [];
    if (activeSkills.length > 0) {
      html += '<div class="section-title">Активные</div>';
      for (var i = 0; i < activeSkills.length; i++) {
        var sk = activeSkills[i];
        html += '<div class="card card-link" onclick="window._nav(\'/skill/' + escHtml(sk.feature_key) + '\')">';
        html += '<div>';
        html += '<div class="card-title">' + escHtml(sk.icon || "") + " " + escHtml(sk.title);
        html += ' <span class="status-active">\u2713</span></div>';
        html += '<div class="card-subtitle">' + escHtml(sk.summary_line) + '</div>';
        html += '</div>';
        html += '<span class="chevron">\u203A</span>';
        html += '</div>';
      }
    }

    // Add subscription button
    html += '<div class="card card-link" onclick="window._nav(\'/catalog\')">';
    html += '<div><div class="card-title">+ Добавить подписку</div></div>';
    html += '<span class="chevron">\u203A</span>';
    html += '</div>';

    return html;
  }

  // --- Screen: Reminders (#/reminders) ---
  function renderReminders() {
    setupBackButton(true);
    var html = '<h1>Напоминания</h1>';

    if (state.reminders === null) {
      // First visit — kick off fetch and show spinner. loadReminders
      // re-renders on completion.
      loadReminders();
      return html + renderLoading();
    }
    var items = (state.reminders && state.reminders.items) || [];
    if (state.reminders && state.reminders._error) {
      return html + '<div class="error-state">Не удалось загрузить напоминания.</div>';
    }
    if (items.length === 0) {
      html += '<div class="empty-state">';
      html += 'Напоминаний пока нет.<br><br>';
      html += 'Скажи боту «напомни мне через 2 часа …» — и оно появится здесь.';
      html += '</div>';
      return html;
    }

    for (var i = 0; i < items.length; i++) {
      var r = items[i];
      // JS doesn't grok \U0001fXXX syntax — use literal UTF-8 chars (the
      // template is served UTF-8) or surrogate-pair escapes. Literals
      // here are clearer and render fine in Telegram WebView.
      var icon = r.is_recurring ? "\uD83D\uDD01" : "\uD83D\uDD14";  // 🔁 or 🔔
      html += '<div class="card">';
      html += '<div class="card-title">' + icon + " " + escHtml(r.title) + '</div>';
      html += '<div class="card-subtitle">' + escHtml(formatDateTime(r.next_trigger_at)) + '</div>';
      if (r.is_recurring) {
        html += '<div class="card-subtitle">' + escHtml(r.recurrence_rule) + '</div>';
      }
      html += '<div class="text-right mt-8">';
      html += '<button class="btn btn-danger btn-small" onclick="window._cancelReminder(\'' + escHtml(r.id) + '\', \'' + escHtml(r.title).replace(/\'/g, "") + '\')">Отменить</button>';
      html += '</div>';
      html += '</div>';
    }
    html += '<div class="card-subtitle" style="text-align:center;margin-top:16px">Всего: ' + items.length + '</div>';
    return html;
  }

  // --- Screen: Shopping (#/shopping) ---
  // User-visible category labels. Keys must match the backend taxonomy
  // (see services/housewife_shopping.py::SHOPPING_CATEGORIES).
  var _SHOPPING_CATEGORY_LABELS = {
    "молочные": "Молочные",
    "мясо_рыба": "Мясо и рыба",
    "овощи_фрукты": "Овощи и фрукты",
    "хлеб": "Хлеб",
    "бакалея": "Бакалея",
    "напитки": "Напитки",
    "готовое": "Готовое",
    "замороженное": "Замороженное",
    "бытовая_химия": "Бытовая химия",
    "другое": "Другое"
  };

  function renderShopping() {
    setupBackButton(true);
    // Header row: title + clear-all icon button.
    var html =
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<h1 style="margin:0">\uD83D\uDED2 Покупки</h1>' +
      '<button class="btn btn-small" ' +
      'onclick="window._clearAllShopping()" ' +
      'style="padding:6px 10px;font-size:18px;background:rgba(0,0,0,0.06);min-width:40px" ' +
      'title="Очистить весь список">\uD83D\uDDD1\uFE0F</button>' +  // 🗑️
      '</div>';

    // Inline "+ Добавить" input at the top — simpler than a modal.
    // Using a form so Enter on mobile submits naturally.
    html += '<form class="card mt-8" onsubmit="return window._addShoppingItem(event)">';
    html += '<input type="text" id="shopping-new-input" placeholder="Что добавить в список?" ';
    html += 'style="width:100%;padding:10px;border:1px solid var(--tg-theme-hint-color,#aaa);';
    html += 'border-radius:8px;background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);font-size:15px" />';
    html += '<button type="submit" class="btn btn-primary mt-8" style="width:100%">Добавить</button>';
    html += '</form>';

    if (state.shopping === null) {
      loadShopping();
      return html + renderLoading();
    }
    var items = (state.shopping && state.shopping.items) || [];
    if (state.shopping && state.shopping._error) {
      return html + '<div class="error-state">Не удалось загрузить список.</div>';
    }
    if (items.length === 0) {
      html += '<div class="empty-state">';
      html += 'Список пуст.<br><br>';
      html += 'Напиши боту «добавь в список молоко и хлеб» — или ';
      html += 'введи вручную сверху.';
      html += '</div>';
      return html;
    }

    // Group by category (items are already sorted by taxonomy order
    // server-side — we just emit a header whenever the category changes).
    var currentCategory = null;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.category !== currentCategory) {
        currentCategory = it.category;
        var label = _SHOPPING_CATEGORY_LABELS[currentCategory] || currentCategory;
        html += '<div class="section-title" data-shop-cat="' + escHtml(currentCategory) + '">' + escHtml(label) + '</div>';
      }
      // data-shop-item lets the handler find the card for surgical
      // remove-with-animation instead of a full re-render.
      html += '<div class="card shop-item" data-shop-item="' + escHtml(it.id) + '" data-shop-cat="' + escHtml(it.category) + '" ';
      html += 'style="display:flex;align-items:center;gap:12px;transition:opacity 0.25s ease,max-height 0.35s ease,padding 0.35s ease,margin 0.35s ease;overflow:hidden;max-height:200px">';
      // Check-box — tap to mark bought. CSS transitions give a brief
      // "check" animation before the card collapses.
      html += '<div class="shop-check" onclick="window._markShoppingBought(\'' + escHtml(it.id) + '\',this)" ';
      html += 'style="width:28px;height:28px;border:2px solid var(--tg-theme-hint-color,#aaa);';
      html += 'border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;';
      html += 'color:transparent;font-weight:bold;font-size:18px;transition:background 0.2s,color 0.2s,border-color 0.2s">';
      html += '\u2713';  // checkmark is invisible until checked
      html += '</div>';
      // Title + optional quantity
      html += '<div class="shop-text" style="flex:1;transition:opacity 0.25s ease">';
      html += '<div class="card-title" style="margin:0">' + escHtml(it.title) + '</div>';
      if (it.quantity_text) {
        html += '<div class="card-subtitle" style="margin:0">' + escHtml(it.quantity_text) + '</div>';
      }
      html += '</div>';
      // Delete icon
      html += '<div onclick="window._deleteShoppingItem(\'' + escHtml(it.id) + '\')" ';
      html += 'style="font-size:20px;color:var(--tg-theme-destructive-text-color,#e04b4b);cursor:pointer;padding:4px 8px">\u00d7</div>';
      html += '</div>';
    }
    html += '<div class="card-subtitle" style="text-align:center;margin-top:16px" id="shop-total">Всего: ' + items.length + '</div>';
    return html;
  }

  // Surgical animate-and-remove for one shopping item. checked=true
  // plays a green checkmark animation first (bought), checked=false
  // skips straight to collapse (delete/cancel). 700ms total for the
  // happy "tick → fade → collapse" sequence; 350ms for the direct
  // delete path. After collapse we prune from state + DOM.
  function _animateRemoveShoppingItem(itemId, checked) {
    var card = document.querySelector('[data-shop-item="' + itemId + '"]');
    if (!card) {
      // Card already gone; just prune state.
      _pruneShoppingItemFromState(itemId);
      return;
    }
    var delayBeforeFade = 0;
    if (checked) {
      var check = card.querySelector(".shop-check");
      if (check) {
        check.style.background = "#2ecc71";
        check.style.borderColor = "#2ecc71";
        check.style.color = "#fff";
      }
      var text = card.querySelector(".shop-text");
      if (text) text.style.textDecoration = "line-through";
      delayBeforeFade = 350;
    }
    setTimeout(function() {
      card.style.opacity = "0";
      card.style.maxHeight = "0px";
      card.style.padding = "0";
      card.style.margin = "0";
      setTimeout(function() {
        if (card.parentNode) card.parentNode.removeChild(card);
        _pruneShoppingItemFromState(itemId);
      }, 380);
    }, delayBeforeFade);
  }

  // Remove the item from state.shopping.items AND clean up the
  // category header if that was the last item in its bucket. Also
  // updates the "Всего: N" counter. If the list becomes empty, we
  // do a single render() so the empty-state message appears.
  function _pruneShoppingItemFromState(itemId) {
    if (!state.shopping || !state.shopping.items) return;
    var removedCat = null;
    state.shopping.items = state.shopping.items.filter(function(it) {
      if (it.id === itemId) { removedCat = it.category; return false; }
      return true;
    });
    // Dashboard tile counter is stale — silently refresh.
    state.menu = null;
    loadData({silent: true});

    // Category header cleanup — if no remaining items share the
    // removed category, drop the header too.
    if (removedCat) {
      var still = state.shopping.items.some(function(it) { return it.category === removedCat; });
      if (!still) {
        var hdr = document.querySelector('.section-title[data-shop-cat="' + removedCat + '"]');
        if (hdr && hdr.parentNode) hdr.parentNode.removeChild(hdr);
      }
    }

    var total = document.getElementById("shop-total");
    if (total) total.textContent = "Всего: " + state.shopping.items.length;

    if (state.shopping.items.length === 0) {
      // Show the empty state banner.
      render();
    }
  }

  // --- Screen: Family (#/family) ---
  var _FAMILY_ROLE_LABELS = {
    "self": "Я",
    "spouse": "Супруг(а)",
    "child": "Ребёнок",
    "parent": "Родитель",
    "other": "Другое"
  };
  var _FAMILY_ROLES = ["self", "spouse", "child", "parent", "other"];

  function renderFamily() {
    setupBackButton(true);

      html += '</div>';
      var ageBlob = "";
      if (m.birth_year) {

      } else if (m.age_hint) {

      }
      if (ageBlob) {
        html += '<div class="card-subtitle">' + escHtml(ageBlob) + '</div>';
      }

        html += '<div class="card-subtitle">' + escHtml(m.notes) + '</div>';
      }
      html += '<div class="text-right mt-8" style="display:flex;gap:8px;justify-content:flex-end">';
      html += '<button class="btn btn-small" ' +
              'onclick="window._editFamilyMember(\'' + escHtml(m.id) + '\')" ' +
              'style="background:rgba(0,0,0,0.06);padding:4px 10px;font-size:16px;min-width:34px" ' +
              'title="Редактировать">\u270F\uFE0F</button>';  // ✏️
      html += '<button class="btn btn-danger btn-small" ' +
              'onclick="window._deleteFamilyMember(\'' + escHtml(m.id) + '\', \'' + escHtml(m.name).replace(/\'/g, "") + '\')" ' +
              'style="padding:4px 10px;font-size:16px;min-width:34px" ' +
              'title="Удалить">\uD83D\uDDD1\uFE0F</button>';  // 🗑️

  // --- Screen: Weekly menu (#/menu) ---
  var _MENU_DAYS_RU = ["Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота", "Воскресенье"];
  var _MEAL_LABELS = {
    "breakfast": "Завтрак",
    "lunch": "Обед",
    "dinner": "Ужин",
    "snack": "Перекус"
  };
  var _MEAL_ORDER = ["breakfast", "lunch", "dinner", "snack"];

  // Build the INNER content of a menu cell (meal label + dish title
  // or "+ добавить" placeholder). Shared by the full renderWeeklyMenu
  // pass AND by the surgical DOM patch after a regen response, so
  // both paths produce identical HTML.
  function _renderMenuCellInner(planId, day, mealType, cell) {
    var cellJson = cell ? JSON.stringify(cell) : "null";
    var cellArg = encodeURIComponent(cellJson);
    var html =
      '<div onclick="window._openMenuEditor(\'' + escHtml(planId) + '\',' + day + ',\'' + mealType + '\',\'' + cellArg + '\')" ' +
      'class="menu-cell-content" ' +
      'style="flex:1;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0.08)">' +
      '<span class="card-subtitle" style="display:inline-block;min-width:90px">' + escHtml(_MEAL_LABELS[mealType]) + ':</span> ';
    if (cell && cell.recipe_id && cell.recipe_title) {
      html += '<span>' + escHtml(cell.recipe_title) + '</span>';
    } else if (cell && cell.free_text) {
      html += '<span>' + escHtml(cell.free_text) + '</span>';
    } else {
      html += '<span class="card-subtitle" style="font-style:italic">+ добавить</span>';
    }
    html += '</div>';
    if (cell && (cell.recipe_id || cell.free_text)) {
      html +=
        '<button class="btn btn-small menu-regen-btn" ' +
        'onclick="event.stopPropagation();window._regenerateMenuCell(\'' + escHtml(planId) + '\',' + day + ',\'' + mealType + '\',this)" ' +
        'style="padding:4px 8px;font-size:12px;background:rgba(0,0,0,0.06);cursor:pointer;min-width:32px" ' +
        'title="Подобрать другое блюдо">' +
        '\u21BB' +
        '</button>';
    }
    return html;
  }

  // The full cell element — outer div with the data-cell attribute
  // that the surgical patch looks up, wrapping the inner content.
  function _renderMenuCellOuter(planId, day, mealType, cell) {
    return (
      '<div class="menu-cell" data-cell="' + day + ':' + mealType + '" ' +
      'style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:8px">' +
      _renderMenuCellInner(planId, day, mealType, cell) +
      '</div>'
    );
  }

  // Surgical DOM patch for one cell after a regen response. Finds
  // the cell by its data-cell attribute, replaces the inner HTML
  // with the new state, and recomputes the day-header kcal total.
  // Avoids full renderWeeklyMenu → no scroll loss, no button flicker,
  // the swap feels like an in-place AJAX update.
  function _patchMenuCellInDom(planId, day, mealType, cell) {
    var sel = '[data-cell="' + day + ':' + mealType + '"]';
    var el = document.querySelector(sel);
    if (!el) return false;
    el.innerHTML = _renderMenuCellInner(planId, day, mealType, cell);
    _updateDayKcalHeader(day);
    return true;
  }

  // Recompute "Понедельник · ~1800 ккал" in the day header after a
  // cell swap might have changed the day's calorie total. The header
  // carries data-day-header="<day>" so we can target it precisely.
  function _updateDayKcalHeader(day) {
    if (!state.weeklyMenu || !state.weeklyMenu.plan) return;
    var items = state.weeklyMenu.plan.items || [];
    var total = 0;
    var hasAny = false;
    for (var i = 0; i < items.length; i++) {
      if (items[i].day_of_week === day && items[i].recipe_calories != null) {
        total += items[i].recipe_calories;
        hasAny = true;
      }
    }
    var hdr = document.querySelector('[data-day-header="' + day + '"]');
    if (!hdr) return;
    var title = _MENU_DAYS_RU[day];
    if (hasAny) title += " \u00b7 ~" + Math.round(total) + " ккал";
    hdr.textContent = title;
  }

  function renderWeeklyMenu() {
    setupBackButton(true);
    var html = '<h1>\uD83D\uDCC5 Меню недели</h1>';

    if (state.weeklyMenu === null) {
      loadWeeklyMenu();
      return html + renderLoading();
    }
    if (state.weeklyMenu && state.weeklyMenu._error) {
      return html + '<div class="error-state">Не удалось загрузить меню.</div>';
    }
    var plan = state.weeklyMenu && state.weeklyMenu.plan;
    if (!plan) {
      html += '<div class="empty-state">';
      html += 'Меню ещё не составлено.<br><br>';
      html += 'Напиши боту «составь меню на неделю» — Среда подберёт ';
      html += 'блюда с учётом твоей семьи и сохранённых рецептов.';
      html += '</div>';
      return html;
    }

    // Index items by (day, meal_type) for O(1) cell lookup.
    var byCell = {};
    for (var i = 0; i < (plan.items || []).length; i++) {
      var it = plan.items[i];
      byCell[it.day_of_week + ":" + it.meal_type] = it;
    }

    html += '<div class="card-subtitle" style="margin-bottom:12px">с ' + escHtml(plan.week_start_date) + '</div>';

    for (var d = 0; d < 7; d++) {
      // Compute day-total calories on the fly (sum of recipe cells
      // that have per-serving nutrition). Free-text cells skipped.
      var dayKcal = 0;
      var kcalHasAny = false;
      for (var mk = 0; mk < _MEAL_ORDER.length; mk++) {
        var ck = byCell[d + ":" + _MEAL_ORDER[mk]];
        if (ck && ck.recipe_calories != null) {
          dayKcal += ck.recipe_calories;
          kcalHasAny = true;
        }
      }
      var title = _MENU_DAYS_RU[d];
      if (kcalHasAny) {
        title += " \u00b7 ~" + Math.round(dayKcal) + " ккал";
      }
      // Day header row: title + "add-to-shopping-for-day" button.
      // data-day-header lets the surgical cell-patch locate this
      // header to recompute the kcal total after an in-place swap.
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 8px 4px">';
      html += '<div class="section-title" data-day-header="' + d + '" style="margin:0">' + escHtml(title) + '</div>';
      html += '<button class="btn btn-small" ';
      html += 'onclick="window._generateShoppingForDay(\'' + escHtml(plan.id) + '\',' + d + ',this)" ';
      html += 'style="padding:4px 10px;font-size:12px;background:rgba(0,0,0,0.06);cursor:pointer" ';
      html += 'title="Добавить продукты этого дня в список покупок">';
      html += '\uD83D\uDED2 В список';
      html += '</button>';
      html += '</div>';

      html += '<div class="card" style="padding:8px 12px">';
      // Render ALL 4 meal slots per day (filled or placeholder) so the
      // user can tap an empty slot to add without going to chat.
      for (var m = 0; m < _MEAL_ORDER.length; m++) {
        html += _renderMenuCellOuter(plan.id, d, _MEAL_ORDER[m], byCell[d + ":" + _MEAL_ORDER[m]]);
      }
      html += '</div>';
    }

    // Auto-gen shopping (Stage 6 wires the button — endpoint comes later).
    html += '<div class="mt-16">';
    html += '<button class="btn btn-primary" onclick="window._generateShoppingFromMenu(\'' + escHtml(plan.id) + '\')" style="width:100%">';
    html += '\uD83D\uDED2 Добавить ингредиенты в список покупок';
    html += '</button>';
    html += '</div>';

    html += '<div class="mt-8">';
    html += '<button class="btn btn-danger btn-small" onclick="window._clearWeeklyMenu(\'' + escHtml(plan.week_start_date) + '\')">Очистить меню</button>';
    html += '</div>';

    return html;
  }

  // --- Screen: Recipes list (#/recipes) ---
  var _RECIPE_SOURCE_BADGES = {
    "user_dictated": "\uD83D\uDCDD",      // 📝
    "ai_generated": "\uD83E\uDD16",       // 🤖
    "web_found": "\uD83C\uDF10",          // 🌐
    "upgraded_from_menu": "\uD83D\uDCC5"  // 📅
  };
  var _RECIPE_SOURCE_LABELS = {
    "user_dictated": "ты сохранил",
    "ai_generated": "придумала Среда",
    "web_found": "из сети",
    "upgraded_from_menu": "из меню"
  };

  function renderRecipesList() {
    setupBackButton(true);
    var html = '<h1>\uD83D\uDCD6 Рецепты</h1>';

    if (state.recipes === null) {
      loadRecipes();
      return html + renderLoading();
    }
    var items = (state.recipes && state.recipes.items) || [];
    if (state.recipes && state.recipes._error) {
      return html + '<div class="error-state">Не удалось загрузить рецепты.</div>';
    }
    if (items.length === 0) {
      html += '<div class="empty-state">';
      html += 'Рецептов пока нет.<br><br>';
      html += 'Скажи боту «сохрани рецепт борща: ...» — или попроси ';
      html += '«придумай рецепт из того что есть в холодильнике» и сохрани.';
      html += '</div>';
      return html;
    }

    for (var i = 0; i < items.length; i++) {

      html += '<div>';

      var sub = "на " + r.servings + " чел";
      if (r.tags && r.tags.length) {
        sub += " · " + r.tags.slice(0, 3).map(escHtml).join(", ");
      }
      html += '<div class="card-subtitle">' + sub + '</div>';

      html += '<span class="chevron">\u203A</span>';
      html += '</div>';

  // --- Screen: Recipe detail (#/recipes/{id}) ---
  function renderRecipeDetail(recipeId) {
    setupBackButton(true);
    var html = '';

    var detail = state.recipeDetail[recipeId];
    if (!detail) {
      loadRecipeDetail(recipeId);
      return renderLoading();
    }
    if (detail._error) {
      return '<div class="error-state">Рецепт не найден.</div>';
    }

    var badge = _RECIPE_SOURCE_BADGES[detail.source] || "❔";
    var sourceLabel = _RECIPE_SOURCE_LABELS[detail.source] || detail.source;

    html += '<h1>' + badge + ' ' + escHtml(detail.title) + '</h1>';
    html += '<div class="card-subtitle">Источник: ' + escHtml(sourceLabel);
    if (detail.source_url) {
      html += ' <a href="' + escHtml(detail.source_url) + '">ссылка</a>';
    }
    html += '</div>';
    html += '<div class="card-subtitle">На ' + detail.servings + ' чел</div>';

    // Nutrition — per-serving if available. Skip block entirely if
    // all four are null (recipe saved before nutrition rollout or
    // LLM couldn't estimate).
    var nutriBits = [];
    if (detail.calories_per_serving != null) {
      nutriBits.push(Math.round(detail.calories_per_serving) + ' ккал');
    }
    if (detail.protein_per_serving != null) {
      nutriBits.push('Б ' + Math.round(detail.protein_per_serving) + 'г');
    }
    if (detail.fat_per_serving != null) {
      nutriBits.push('Ж ' + Math.round(detail.fat_per_serving) + 'г');
    }
    if (detail.carbs_per_serving != null) {
      nutriBits.push('У ' + Math.round(detail.carbs_per_serving) + 'г');
    }
    if (nutriBits.length) {
      html += '<div class="card-subtitle">На порцию: ' + nutriBits.join(' · ') + '</div>';
    }

    if (detail.ingredients && detail.ingredients.length) {
      html += '<div class="section-title">Ингредиенты</div>';
      html += '<div class="card">';
      for (var i = 0; i < detail.ingredients.length; i++) {
        var ing = detail.ingredients[i];
        var qty = ing.quantity_text ? " — " + escHtml(ing.quantity_text) : "";
        var opt = ing.is_optional ? " <em>(по желанию)</em>" : "";
        html += '<div>• ' + escHtml(ing.title) + qty + opt + '</div>';
      }
      html += '</div>';
    }

    if (detail.instructions_md) {
      html += '<div class="section-title">Приготовление</div>';
      html += '<div class="card" style="white-space:pre-wrap">' + escHtml(detail.instructions_md) + '</div>';
    }

    html += '<div class="mt-16 text-right">';
    html += '<button class="btn btn-danger btn-small" onclick="window._deleteRecipe(\'' + escHtml(detail.id) + '\', \'' + escHtml(detail.title).replace(/\'/g, "") + '\')">Удалить</button>';
    html += '</div>';

    return html;
  }

  // --- Screen: EDS Monitor skill (#/skill/eds_monitor) ---
  function renderEdsSkill() {
    setupBackButton(true);
    var s = state.summary;
    var html = '<h1>EDS Monitor</h1>';

    html += '<div class="section-title">Подписки EDS</div>';

    var subs = s.eds_subscriptions || [];
    for (var i = 0; i < subs.length; i++) {
      var sub = subs[i];
      html += '<div class="card">';
      html += '<div class="card-title">' + escHtml(sub.title);
      if (sub.status === "active") {
        html += ' <span class="status-active">\u2713</span>';
      } else if (sub.status === "scheduled_for_cancel") {
        html += ' <span class="status-warning">\u26A0</span>';
      }
      html += '</div>';
      html += '<div class="card-subtitle">' + formatPrice(sub.price_rub) + '</div>';
      html += '<div class="card-subtitle">до ' + formatDate(sub.active_until) + '</div>';

      if (sub.status === "scheduled_for_cancel") {
        html += '<div class="card-subtitle status-warning">Не будет продлена</div>';
      }

      // Connected EDS account
      if (sub.account) {
        var acc = sub.account;
        html += '<div class="eds-account">';
        html += '<div class="eds-account-header">';
        html += '<div>';
        html += '<div class="eds-account-login">' + escHtml(acc.login_masked) + '</div>';
        if (acc.status === "active") {
          html += '<div class="eds-account-status status-active">Активен</div>';
        } else if (acc.status === "scheduled_for_disconnect") {
          html += '<div class="eds-account-status status-warning">Будет отключён</div>';
        } else if (acc.status === "pending_verification") {
          html += '<div class="eds-account-status">Проверка...</div>';
        } else if (acc.status === "auth_failed") {
          html += '<div class="eds-account-status status-warning">Ошибка авторизации</div>';
        } else {
          html += '<div class="eds-account-status">' + escHtml(acc.status) + '</div>';
        }
        html += '</div>';
        if (acc.status === "scheduled_for_disconnect") {
          html += '<button class="btn btn-success btn-small" onclick="window._edsRestore(\'' + escHtml(acc.id) + '\')">Вернуть</button>';
        } else {
          html += '<button class="btn btn-danger btn-small" onclick="window._edsCancel(\'' + escHtml(acc.id) + '\', \'' + escHtml(acc.login_masked) + '\')">Отвязать</button>';
        }
        html += '</div></div>';
      } else if (sub.is_free_slot) {
        // Free slot without connected account
        html += '<div class="card-subtitle mt-8" style="font-style:italic">Кабинет не подключён</div>';
        html += '<button class="btn btn-primary btn-small mt-8" onclick="window._edsConnect()">Подключить ЛК EDS</button>';
      }

      // Cancel/resume subscription
      if (sub.status === "scheduled_for_cancel") {
        html += '<div class="text-right mt-8"><button class="btn btn-success" onclick="window._resume(\'eds_monitor_base\')">Возобновить</button></div>';
      } else if (sub.can_cancel) {
        if (sub.slot_type === "free") {
          html += '<div class="text-right mt-8"><button class="btn btn-danger" onclick="window._removeSlot()">Отменить подписку</button></div>';
        } else {
          html += '<div class="text-right mt-8"><button class="btn btn-danger" onclick="window._cancelEds(\'' + escHtml(sub.cancel_type || "base") + '\')">Отменить подписку</button></div>';
        }
      }

      html += '</div>';
    }

    // Add cabinet button
    html += '<div class="card">';
    html += '<button class="btn btn-primary" onclick="window._addCabinet()">+ Добавить кабинет</button>';
    html += '<div class="card-subtitle mt-8" style="text-align:center">' + formatPrice(s.extra_price_rub || 2990) + '</div>';
    html += '</div>';

    // Renewal section
    if (s.next_payment_due_at && s.next_amount_rub > 0) {
      html += '<div class="section-title">Продление</div>';
      html += '<div class="card">';
      html += '<div class="card-subtitle">Следующий платёж: ' + formatDate(s.next_payment_due_at) + '</div>';
      html += '<div class="card-subtitle">Сумма: ' + s.next_amount_rub.toLocaleString("ru-RU") + ' \u20bd</div>';
      html += '<button class="btn btn-primary mt-16" onclick="window._renew()">Продлить сейчас</button>';
      html += '</div>';
    }

    return html;
  }

  // --- Screen: Generic skill (#/skill/{key}) ---
  function renderGenericSkill(featureKey) {
    setupBackButton(true);
    var s = state.summary;
    var skill = null;
    var allSkills = (s.active_skills || []).concat(s.available_skills || []);
    for (var i = 0; i < allSkills.length; i++) {
      if (allSkills[i].feature_key === featureKey) { skill = allSkills[i]; break; }
    }
    if (!skill) return '<div class="error-state">Навык не найден</div>';

    var html = '<h1>' + escHtml(skill.title) + '</h1>';
    html += '<div class="description">' + escHtml(skill.description) + '</div>';

    html += '<div class="card">';
    if (skill.is_active) {
      html += '<div class="card-title">Статус: Активно <span class="status-active">\u2713</span></div>';
      html += '<div class="card-subtitle">' + formatPrice(skill.price_rub) + '</div>';
      if (skill.price_rub && skill.price_rub > 0) {
        html += '<div class="card-subtitle">до ' + formatDate(skill.active_until) + '</div>';
      } else {
        html += '<div class="card-subtitle">Подключено бессрочно</div>';
      }
    } else {
      html += '<div class="card-title">Статус: <span class="status-inactive">Не подключено</span></div>';
      html += '<div class="card-subtitle">' + formatPrice(skill.price_rub) + '</div>';
    }
    html += '</div>';

    if (skill.is_active) {
      html += '<button class="btn btn-danger mt-8" onclick="window._cancelSkill(\'' + escHtml(featureKey) + '\', \'' + escHtml(skill.plan_key) + '\')">Отключить</button>';
    } else {
      html += '<button class="btn btn-primary mt-8" onclick="window._subscribeSkill(\'' + escHtml(skill.plan_key) + '\', \'' + escHtml(skill.title) + '\', ' + (skill.price_rub || 0) + ')">Подключить</button>';
    }

    return html;
  }

  // --- Screen: Catalog (#/catalog) ---
  function renderCatalog() {
    setupBackButton(true);
    var html = '<h1>Добавить подписку</h1>';

    var available = (state.summary && state.summary.available_skills) || [];
    if (available.length === 0) {
      html += '<div class="empty-state">Все доступные подписки уже подключены</div>';
      return html;
    }

    for (var i = 0; i < available.length; i++) {
      var p = available[i];
      html += '<div class="card card-link" onclick="window._nav(\'/catalog/' + escHtml(p.plan_key) + '\')">';
      html += '<div>';
      html += '<div class="card-title">' + escHtml(p.icon || "") + " " + escHtml(p.title) + '</div>';
      html += '<div class="card-subtitle">' + escHtml(p.description) + '</div>';
      html += '<div class="card-subtitle">' + formatPrice(p.price_rub) + '</div>';
      html += '</div>';
      html += '<span class="chevron">\u203A</span>';
      html += '</div>';
    }

    return html;
  }

  // --- Screen: Plan detail (#/catalog/{plan_key}) ---
  function renderPlanDetail(planKey) {
    setupBackButton(true);
    var plan = findPlan(planKey);
    if (!plan) return '<div class="error-state">План не найден</div>';

    var html = '<h1>' + escHtml(plan.title) + '</h1>';
    html += '<div class="description">' + escHtml(plan.description) + '</div>';
    html += '<div class="price-large">' + formatPrice(plan.price_rub) + '</div>';
    html += '<button class="btn btn-primary" onclick="window._subscribeSkill(\'' + escHtml(plan.plan_key) + '\', \'' + escHtml(plan.title) + '\', ' + (plan.price_rub || 0) + ')">Подключить</button>';

    return html;
  }

  // -- Main render --
  function render() {
    if (state.loading) { $app.innerHTML = renderLoading(); return; }
    if (state.error) { $app.innerHTML = renderError(); return; }

    var route = getRoute();
    var html;

    if (route === "/") {
      html = renderDashboard();
    } else if (route === "/subscriptions") {
      html = renderSubscriptions();
    } else if (route === "/reminders") {
      html = renderReminders();
    } else if (route === "/shopping") {
      html = renderShopping();
    } else if (route === "/family") {
      html = renderFamily();
    } else if (route === "/menu") {
      html = renderWeeklyMenu();
    } else if (route === "/recipes") {
      html = renderRecipesList();
    } else if (route.indexOf("/recipes/") === 0) {
      var recipeId = route.replace("/recipes/", "");
      html = renderRecipeDetail(recipeId);
    } else if (route === "/skill/eds_monitor") {
      html = renderEdsSkill();
    } else if (route.indexOf("/skill/") === 0) {
      var featureKey = route.replace("/skill/", "");
      html = renderGenericSkill(featureKey);
    } else if (route === "/catalog") {
      html = renderCatalog();
    } else if (route.indexOf("/catalog/") === 0) {
      var planKey = route.replace("/catalog/", "");
      html = renderPlanDetail(planKey);
    } else {
      html = renderDashboard();
    }

    $app.innerHTML = html;
  }

  window._nav = function(path) { navigate(path); };

  window._subscribeSkill = function(planKey, title, priceRub) {

      doAction("/miniapp/api/v1/cancel", { plan_key: planKey })

  // ---- Shopping actions ----
  window._addShoppingItem = function(event) {
    if (event) event.preventDefault();
    var inp = document.getElementById("shopping-new-input");
    var title = (inp && inp.value || "").trim();
    if (!title) return false;
    apiFetch("/miniapp/api/v1/shopping", {
      method: "POST",
      body: { title: title }
    }).then(function(res) {
      if (res && res.ok) {
        if (inp) inp.value = "";
        state.shopping = null;
        state.menu = null; // refresh dashboard counter
        loadData().then(function() { loadShopping(); });
      } else {
        showAlert("Не удалось добавить.");
      }
    }).catch(function() { showAlert("Не удалось добавить."); });
    return false;
  };

  window._markShoppingBought = function(itemId, checkEl) {
    // Optimistic UX: start the animation immediately, don't wait for
    // the server. If the request fails we rollback via render().
    if (checkEl && checkEl.dataset.busy) return;
    if (checkEl) checkEl.dataset.busy = "1";
    apiFetch("/miniapp/api/v1/shopping/" + itemId + "/bought", {
      method: "POST",
      body: {}
    }).then(function(res) {
      if (res && res.ok) {
        _animateRemoveShoppingItem(itemId, true);
      } else {
        if (checkEl) delete checkEl.dataset.busy;
        showAlert("Не удалось отметить.");
      }
    }).catch(function() {
      if (checkEl) delete checkEl.dataset.busy;
      showAlert("Не удалось отметить.");
    });
  };

  window._deleteShoppingItem = function(itemId) {
    // No confirm popup — delete is one tap, undo is just "добавь X"
    // to the chat. Keeps the list feeling light.
    apiFetch("/miniapp/api/v1/shopping/" + itemId, {
      method: "DELETE"
    }).then(function(res) {
      if (res && res.ok) {
        _animateRemoveShoppingItem(itemId, false);
      } else {
        showAlert("Не удалось убрать.");
      }
    }).catch(function() { showAlert("Не удалось убрать."); });
  };

  window._clearAllShopping = function() {
    var count = (state.shopping && state.shopping.items)
      ? state.shopping.items.length : 0;
    if (count === 0) return;
    showPopup("Очистить весь список? Будет убрано: " + count + ".", function() {
      apiFetch("/miniapp/api/v1/shopping/clear-all", {
        method: "POST",
        body: {}
      }).then(function(res) {
        if (res && res.ok) {
          var items = ((state.shopping && state.shopping.items) || []).slice();
          // Stagger the collapse animations by 30ms each for a nice
          // "waterfall" effect. Total time = 30ms × N + 380ms.
          items.forEach(function(it, idx) {
            setTimeout(function() {
              _animateRemoveShoppingItem(it.id, false);
            }, idx * 30);
          });
        } else {
          showAlert("Не удалось очистить список.");
        }
      }).catch(function() { showAlert("Не удалось очистить список."); });
    });
  };

  // Menu cell editor (v1.2 Stage 5). Tap on a #/menu cell opens a
  // modal with three fields: free-text title, dropdown over the user's
  // recipe book, and notes. Save calls PATCH weekly-menu/{plan}/item.
  // "Очистить" sends the same PATCH with recipe_id=null + empty text,
  // service treats that as cell deletion.
  window._openMenuEditor = function(planId, day, mealType, cellArg) {
    var cell = null;
    try {
      var raw = decodeURIComponent(cellArg || "null");
      cell = JSON.parse(raw);
    } catch (e) { cell = null; }

    // Make sure recipes are loaded so the dropdown has options. If not
    // cached yet, fire loadRecipes and show a stub message in the list.
    if (state.recipes === null) loadRecipes();

    // Preserve the route-level back handler so we can restore it when
    // the modal closes. Without this, Android's system-back triangle
    // bubbles up to the route handler and navigates the whole Mini App
    // back a step while the modal stays visible on top.
    var prevBackHandler = _backHandler;

    var overlay = document.createElement("div");
    overlay.style.cssText =
      "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);" +
      "z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;";

    function closeModal() {
      if (!overlay.parentNode) return;
      document.body.removeChild(overlay);
      if (tg && tg.BackButton) {
        try { tg.BackButton.offClick(closeModal); } catch (e) {}
        _backHandler = prevBackHandler;
        if (_backHandler) {
          tg.BackButton.onClick(_backHandler);
        } else {
          tg.BackButton.hide();
        }
      }
    }

    overlay.onclick = function(e) {
      if (e.target === overlay) closeModal();
    };

    // Hijack the Telegram BackButton (== Android system back on iOS/Android
    // Telegram clients) to close the modal instead of navigating the
    // route. On close we restore the route-level handler above.
    if (tg && tg.BackButton) {
      if (_backHandler) {
        try { tg.BackButton.offClick(_backHandler); } catch (e) {}
      }
      _backHandler = closeModal;
      tg.BackButton.onClick(closeModal);
      tg.BackButton.show();
    }

    var modal = document.createElement("div");
    modal.style.cssText =
      "background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);" +
      "border-radius:12px;padding:16px;max-width:400px;width:100%;" +
      "max-height:80vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.3);";

    var dayName = _MENU_DAYS_RU[day] || ("День " + day);
    var mealLabel = _MEAL_LABELS[mealType] || mealType;
    var currentRecipeId = (cell && cell.recipe_id) || "";
    var currentText = (cell && cell.free_text) || "";
    var currentNotes = (cell && cell.notes) || "";
    var titlePrefill = cell && cell.recipe_title ? cell.recipe_title : currentText;

    var recipes = (state.recipes && state.recipes.items) || [];
    var options = '<option value="">— не из книги —</option>';
    for (var i = 0; i < recipes.length; i++) {
      var r = recipes[i];
      var sel = r.id === currentRecipeId ? " selected" : "";
      options += '<option value="' + escHtml(r.id) + '"' + sel + '>' + escHtml(r.title) + '</option>';
    }

    modal.innerHTML =
      '<h2 style="margin:0 0 4px 0;font-size:18px">' + escHtml(dayName) + ' · ' + escHtml(mealLabel) + '</h2>' +
      '<p class="card-subtitle" style="margin:0 0 12px 0">Что готовим?</p>' +

      '<label class="card-subtitle" style="display:block;margin:8px 0 4px 0">Название блюда</label>' +
      '<input id="_me_text" type="text" style="width:100%;padding:10px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font-size:15px;box-sizing:border-box" ' +
      'value="' + escHtml(titlePrefill) + '" placeholder="например, «паста с курицей»">' +

      '<label class="card-subtitle" style="display:block;margin:12px 0 4px 0">Или из книги рецептов</label>' +
      '<select id="_me_recipe" style="width:100%;padding:10px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font-size:15px;box-sizing:border-box">' +
      options + '</select>' +

      '<label class="card-subtitle" style="display:block;margin:12px 0 4px 0">Заметки</label>' +
      '<textarea id="_me_notes" rows="2" style="width:100%;padding:10px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font-size:15px;box-sizing:border-box;resize:vertical" ' +
      'placeholder="на двоих / холодный / с собой">' + escHtml(currentNotes) + '</textarea>' +

      '<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">' +
      '<button id="_me_save" class="btn btn-primary" style="flex:1;min-width:120px">Сохранить</button>' +
      (cell ? '<button id="_me_clear" class="btn btn-danger" style="flex:1;min-width:100px">Очистить</button>' : '') +
      '<button id="_me_cancel" class="btn" style="flex:1;min-width:100px;background:rgba(0,0,0,0.08)">Отмена</button>' +
      '</div>';

    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    function patchCell(payload) {
      apiFetch("/miniapp/api/v1/weekly-menu/" + planId + "/item", {
        method: "PATCH",
        body: payload,
      }).then(function(res) {
        closeModal();
        if (res && res.ok) {
          state.weeklyMenu = null;  // force reload on next renderWeeklyMenu
          loadWeeklyMenu();
        } else {
          showAlert("Не удалось сохранить.");
        }
      }).catch(function() { showAlert("Не удалось сохранить."); });
    }

    document.getElementById("_me_save").onclick = function() {
      var txt = (document.getElementById("_me_text").value || "").trim();
      var rid = document.getElementById("_me_recipe").value || null;
      var nts = (document.getElementById("_me_notes").value || "").trim() || null;
      // Recipe dropdown wins when set — title field ignored in that
      // case (service stores recipe_id; UI shows recipe title).
      patchCell({
        day_of_week: day,
        meal_type: mealType,
        recipe_id: rid,
        free_text: rid ? null : (txt || null),
        notes: nts,
      });
    };

    var clearBtn = document.getElementById("_me_clear");
    if (clearBtn) {
      clearBtn.onclick = function() {
        patchCell({
          day_of_week: day,
          meal_type: mealType,
          recipe_id: null,
          free_text: null,
          notes: null,
        });
      };
    }

    document.getElementById("_me_cancel").onclick = closeModal;
  };

      apiFetch("/miniapp/api/v1/weekly-menu?week_start=" + weekStart, {

  window._generateShoppingForDay = function(planId, day, btn) {
    // Silent AJAX — no full re-render, no loading spinner replacing
    // the menu page. Only the tapped button's label briefly changes
    // to "…" and then to a tick/count so the user sees the outcome
    // without leaving their scroll position on #/menu.
    var originalLabel = null;
    if (btn && btn.tagName === "BUTTON") {
      if (btn.disabled) return;
      originalLabel = btn.innerHTML;
      btn.disabled = true;
      btn.style.opacity = "0.7";
      btn.innerHTML = '<span class="spinner-small"></span>';
    }
    function restore(labelOverride) {
      if (btn && btn.tagName === "BUTTON") {
        btn.disabled = false;
        btn.style.opacity = "";
        btn.innerHTML = labelOverride != null ? labelOverride : originalLabel;
      }
    }
    apiFetch("/miniapp/api/v1/weekly-menu/" + planId + "/generate-shopping-for-day", {
      method: "POST",
      body: { day_of_week: day },
    }).then(function(res) {
      if (res && res.ok) {
        var added = res.added || 0;
        if (added === 0) {
          // Show a short "0" on the button for a moment, then restore.
          restore("0");
          setTimeout(function() { restore(); }, 1200);
        } else {
          // Briefly show "+N" so the user sees their tap took effect,
          // then restore. Shopping list data itself is invalidated so
          // next visit to #/shopping will fetch fresh.
          restore("+" + added);
          setTimeout(function() { restore(); }, 1500);
          state.shopping = null;
        }
      } else {
        restore();
      }
    }).catch(function() { restore(); });
  };

  window._regenerateMenuCell = function(planId, day, mealType, btn) {
    // Per-button cosmetic lock — spinner replaces ↻ while the LLM
    // call is in flight. Backend also rejects same-cell parallel
    // requests with 409, and serialises different-cell regens per
    // plan so dishes don't duplicate.
    var originalLabel = null;
    if (btn && btn.tagName === "BUTTON") {
      if (btn.disabled) return;
      originalLabel = btn.innerHTML;
      btn.disabled = true;
      btn.style.opacity = "0.7";
      btn.style.cursor = "default";
      btn.innerHTML = '<span class="spinner-small"></span>';
    }
    function unlock() {
      // Always try to restore the button even if it was detached from
      // DOM by a surgical patch — detaching sets isConnected=false but
      // the object still holds state. If the patch succeeded the fresh
      // button in the new DOM is already unlocked; this call is a
      // safety net for the case where the patch didn't run (no-op DOM
      // still shows the original spinning button that must be cleared).
      if (btn && btn.tagName === "BUTTON") {
        btn.disabled = false;
        btn.style.opacity = "";
        btn.style.cursor = "pointer";
        if (originalLabel !== null) btn.innerHTML = originalLabel;
      }
    }

    apiFetch("/miniapp/api/v1/weekly-menu/" + planId + "/regenerate-item", {
      method: "POST",
      body: { day_of_week: day, meal_type: mealType },
    }).then(function(res) {
      try {
        if (res && res.ok && res.item) {
          // Update in-memory state IN PLACE so subsequent full renders
          // (e.g. navigation away and back) show the new cell without
          // a server round-trip.
          if (state.weeklyMenu && state.weeklyMenu.plan) {
            var items = state.weeklyMenu.plan.items || [];
            var replaced = false;
            for (var i = 0; i < items.length; i++) {
              if (items[i].day_of_week === day && items[i].meal_type === mealType) {
                items[i] = res.item;
                replaced = true;
                break;
              }
            }
            if (!replaced) items.push(res.item);
            state.weeklyMenu.plan.items = items;
          }
          // Surgical DOM update for the one cell.
          var patched = _patchMenuCellInDom(planId, day, mealType, res.item);
          if (!patched) {
            // Fallback: couldn't locate the cell in the DOM (user
            // may have navigated away and back). Do a full render
            // so state-in-place doesn't stay invisible.
            render();
          }
        }
      } catch (e) {
        console.error("regen: post-success handler failed", e);
      }
      // ALWAYS unlock as the last step, regardless of whether the
      // patch succeeded — if the button is still in the DOM (patch
      // failed, or full re-render hasn't happened yet), we unstick
      // the spinner. This is the bug-fix for "кнопки крутятся,
      // ничего не происходит".
      unlock();
    }).catch(function(err) {
      console.warn("regen failed", err);
      unlock();
    });
  };

  window._generateShoppingFromMenu = function(planId) {
    showPopup("Добавить ингредиенты блюд недели в список покупок?", function() {
      apiFetch("/miniapp/api/v1/weekly-menu/" + planId + "/generate-shopping", {
        method: "POST",
        body: {}
      }).then(function(res) {
        if (res && res.ok) {
          var added = res.added || 0;
          if (added === 0) {
            showAlert("В меню нет рецептов с ингредиентами — добавить нечего.");
          } else {
            showAlert("Добавлено в список: " + added + ".");
            state.shopping = null;
            state.menu = null;
            loadData();
          }
        } else {
          showAlert("Не удалось собрать список.");
        }
      }).catch(function() { showAlert("Не удалось собрать список."); });
    });
  };

  window._deleteRecipe = function(recipeId, title) {
    showPopup("Удалить рецепт «" + title + "»?", function() {
      apiFetch("/miniapp/api/v1/recipes/" + recipeId, { method: "DELETE" })
        .then(function(res) {
          if (res && res.ok) {
            state.recipes = null;
            state.menu = null;
            delete state.recipeDetail[recipeId];
            loadData().then(function() { navigate("/recipes"); });
          } else {
            showAlert("Не удалось удалить.");
          }
        }).catch(function() { showAlert("Не удалось удалить."); });
    });
  };

  window._cancelReminder = function(reminderId, title) {
    showPopup("Отменить напоминание «" + title + "»?", function() {
      apiFetch("/miniapp/api/v1/reminders/" + reminderId + "/cancel", {
        method: "POST",
        body: {},
      }).then(function(res) {
        if (res && res.ok) {
          // Refresh reminders list in place — also refresh the menu so
          // the dashboard counter drops when the user goes back.
          state.reminders = null;
          state.menu = null;
          loadData().then(function() {
            loadReminders();
          });
        } else {
          showAlert("Не удалось отменить.");
        }
      }).catch(function() { showAlert("Не удалось отменить."); });
    });
  };

  window._cancelEds = function(cancelType) {
    showPopup("Подписка будет активна до конца периода. Отменить продление?", function() {
      doAction("/miniapp/api/v1/cancel", { plan_key: "eds_monitor_base" })
        .catch(function() { showAlert("Не удалось отменить."); });
    });
  };

  window._resume = function(planKey) {
    doAction("/miniapp/api/v1/resume", { plan_key: planKey })
      .catch(function() { showAlert("Не удалось возобновить."); });
  };

  window._renew = function() {
    showPopup("Продлить подписки сейчас?", function() {
      doAction("/miniapp/api/v1/renew")
        .catch(function() { showAlert("Не удалось продлить."); });
    });
  };

  window._edsCancel = function(accountId, login) {
    showPopup("Отвязать кабинет " + login + "?", function() {
      doAction("/miniapp/api/v1/eds/accounts/" + accountId + "/cancel")
        .catch(function() { showAlert("Не удалось отвязать."); });
    });
  };

  window._edsRestore = function(accountId) {
    doAction("/miniapp/api/v1/eds/accounts/" + accountId + "/restore")
      .catch(function() { showAlert("Не удалось вернуть."); });
  };

  window._edsConnect = function() {
    apiFetch("/miniapp/api/v1/eds/connect", { method: "POST", body: {} })
      .then(function(res) {
        if (res.connect_url) {
          location.href = res.connect_url;
        } else {
          showAlert(res.message || "Не удалось создать ссылку.");
        }
      })
      .catch(function() { showAlert("Не удалось создать ссылку."); });
  };

  window._addCabinet = function() {
    var price = (state.summary && state.summary.extra_price_rub) || 2990;
    showPopup("Добавить кабинет за " + price.toLocaleString("ru-RU") + " \u20bd/мес?", function() {
      apiFetch("/miniapp/api/v1/eds/add-and-connect", { method: "POST", body: {} })
        .then(function(res) {
          if (res.connect_url) {
            location.href = res.connect_url;
          } else {
            showAlert(res.message || "Не удалось создать ссылку.");
            loadData();
          }
        })
        .catch(function() { showAlert("Не удалось добавить."); });
    });
  };

  window._removeSlot = function() {
    showPopup("Подписка будет активна до конца периода. Отменить продление?", function() {
      doAction("/miniapp/api/v1/eds/slot/remove")
        .catch(function() { showAlert("Не удалось отменить."); });
    });
  };

  // -- Init --
  window.addEventListener("hashchange", render);

  // Invalidate cached server state when the Mini App regains focus —
  // the user likely went to chat and asked the bot to mutate something
  // (save recipes, add shopping, edit family). Without this, the UI
  // keeps showing stale data until the user force-closes and reopens.
  // Fires on tab-focus (visibility) and on Telegram viewport events.
  var _lastRefreshAt = 0;
  function _refetchAllOnReturn() {
    // Throttle: at most once every 2s. Telegram fires viewportChanged
    // frequently on keyboard open/close, don't bombard the server.
    var now = Date.now();
    if (now - _lastRefreshAt < 2000) return;
    _lastRefreshAt = now;
    // Silent refresh: we don't null state slots or flip loading=true,
    // because that would replace visible content with a spinner and
    // swallow the user's first tap on a dashboard card. Instead each
    // loader overwrites its slot on resolve and re-renders, giving
    // an atomic "old data → new data" swap with no blank in-between.
    loadData({silent: true});
    // Page-specific loaders are only fired when the corresponding
    // route is currently visible — otherwise re-fetching a screen the
    // user isn't looking at wastes bandwidth. The hashchange handler
    // will re-trigger them lazily if the user navigates there.
    var route = getRoute();
    if (route === "/reminders" && state.reminders !== null) loadReminders();
    if (route === "/shopping" && state.shopping !== null) loadShopping();
    if (route === "/recipes" && state.recipes !== null) loadRecipes();
    if (route === "/menu" && state.weeklyMenu !== null) loadWeeklyMenu();
    if (route === "/family" && state.family !== null) loadFamily();
    // Recipe detail page (#/recipes/{id}) — refetch currently viewed recipe.
    var detailMatch = route.match(/^\/recipes\/(.+)$/);
    if (detailMatch && state.recipeDetail[detailMatch[1]] !== undefined) {
      loadRecipeDetail(detailMatch[1]);
    }
  }
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "visible") _refetchAllOnReturn();
  });
  if (tg && typeof tg.onEvent === "function") {
    // Telegram-specific: fires when the Mini App is re-opened from the
    // tray or when the user returns from another screen within Telegram.
    try { tg.onEvent("themeChanged", _refetchAllOnReturn); } catch (e) {}
  }
  window.addEventListener("focus", _refetchAllOnReturn);
  loadData();
})();
</script>
