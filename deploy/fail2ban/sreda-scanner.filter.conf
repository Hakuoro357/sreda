# 2026-04-30: fail2ban filter — IP'ы которые лезут на scanner-paths.
# Матчит nginx access.log (default combined format).
# Срабатывает на любой запрос к подозрительным URL'ам (status code
# не важен — даже если nginx уже вернул 444, мы хотим IP в бан
# чтобы он больше не отжирал TCP+TLS handshake).

[Definition]

failregex = ^<HOST>.*"(GET|POST|HEAD|PROPFIND|PUT|OPTIONS)\s+[^"]*\.(php|aspx?|bak|swp|sql|old)([?\s]|$)[^"]*".*$
            ^<HOST>.*"(GET|POST|HEAD|PROPFIND|PUT|OPTIONS)\s+/(wp-|wordpress|phpmyadmin|cgi-bin|\.env|\.git/|\.svn/|containers/|ecp/|actuator|jolokia)[^"]*".*$
            ^<HOST>.*"(GET|POST|HEAD|PROPFIND|PUT|OPTIONS)\s+[^"]*(wlwmanifest\.xml|HNAP1|_vti_bin|xmlrpc)[^"]*".*$

ignoreregex =

datepattern = ^[^\[]*\[({DATE})
              {^LN-BEG}
