# 2026-04-30: ban IP'ов которые сканируют known scanner-paths.
# 3 запроса на scanner-path в течение 2 минут → бан 24 часа.
# Логи берём из nginx access.log (отдельная log-файла нет).

[sreda-scanner]
enabled = true
filter = sreda-scanner
logpath = /var/log/nginx/access.log
maxretry = 3
findtime = 120
bantime = 86400
action = iptables-multiport[name=sreda-scanner, port="http,https", protocol=tcp]
