# 2026-04-29: connect.vexspace.ru → alias к miniapp.sredaspace.ru.
# Старые inline-кнопки бота с URL connect.vexspace.ru/miniapp/ продолжают
# работать после ухода старого VPS 72.56.5.112.
server {
    if ($host = connect.vexspace.ru) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name connect.vexspace.ru;
    return 404;
}
