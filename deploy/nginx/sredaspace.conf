# sredaspace.ru — landing-stub for MAX bot registration.
# Generated 2026-04-30. Будет заменён на полноценный Astro lending позже.
#
# Deploy:
#   1. cp deploy/sredaspace/* /var/www/sredaspace/
#   2. cp deploy/nginx/sredaspace.conf /etc/nginx/sites-available/sredaspace
#   3. ln -s /etc/nginx/sites-available/sredaspace /etc/nginx/sites-enabled/
#   4. certbot --nginx -d sredaspace.ru -d www.sredaspace.ru
#      (certbot автоматом добавит ssl_certificate, redirect 80→443, etc.)

server {
    listen 80;
    server_name sredaspace.ru www.sredaspace.ru;
    root /var/www/sredaspace;
    index index.html;

    include snippets/sreda-block-scanners.conf;

    # Rate limit (reuse same zone as bot — per-IP $binary_remote_addr)
    location / {
        limit_req zone=sreda_general burst=30 nodelay;
        try_files $uri $uri/ $uri.html =404;
    }

    # ACME challenge для certbot HTTP-01
    location /.well-known/acme-challenge/ {
        root /var/www/sredaspace;
    }
}

# После `certbot --nginx -d sredaspace.ru -d www.sredaspace.ru` certbot
# добавит к этому файлу:
#   - listen 443 ssl + ssl_certificate paths
#   - 80 → 443 redirect server block
# Те директивы НЕ включены в этот шаблон чтобы не дублировались —
# certbot управляет ими сам, отметив "# managed by Certbot".
