# 2026-04-30: drop common scanner paths (WordPress, PHP, Docker exposure,
# Exchange RCE, etc). Возвращаем 444 — nginx закрывает connection без
# response. Scanner думает что server мёртв и идёт дальше. access_log
# оставляем включённым чтобы fail2ban мог матчить и банить IP firewall'ом.
#
# Что блокируем:
#   *.php, *.aspx, *.bak, *.swp, *.sql, *.old — расширения
#   /wp-*, /wordpress, /phpmyadmin — WordPress
#   /xmlrpc.php, /wlwmanifest.xml — WP-плагины
#   /.env, /.env.bak — экспозированные секреты
#   /.git/, /.svn/ — VCS
#   /containers/json — Docker API
#   /ecp/ — MS Exchange
#   /actuator, /jolokia — Spring Boot
#   /HNAP1/, /_vti_bin/ — старые девайс-эксплойты, FrontPage
#
# Подключается через `include snippets/sreda-block-scanners.conf;` в
# каждый HTTPS server block.

location ~* (\.php$|\.aspx?$|\.bak$|\.swp$|\.sql$|\.old$) { return 444; }
location ~* ^/(wp-|wordpress|phpmyadmin|cgi-bin|\.env|\.git/|\.svn/|containers/|ecp/|actuator|jolokia) { return 444; }
location ~* (wlwmanifest\.xml|xmlrpc\.php|HNAP1|_vti_bin) { return 444; }
