# Sreda VDS TCP keepalive tuning.
# Установка: cp 99-sreda-tcp.conf /etc/sysctl.d/ && sysctl -p /etc/sysctl.d/99-sreda-tcp.conf
#
# Зачем: default Linux tcp_keepalive_time = 7200s (2 часа). Когда intermediate
# firewall (Timeweb anti-DDoS, NAT, и т.п.) разрывает idle TCP-connection без
# RST, ни клиент ни сервер не узнают 2 часа. Telegram'у webhook'и попадают на
# stale connections → "Connection timed out" timeout 60s → юзер ждёт.
#
# Прецедент 2026-04-30: после рестарта sreda-uvicorn TG keep-alive
# периодически дох без RST. Юзеры получали delays 30-60s.
#
# Эти параметры заставляют kernel начать probe'ы через 60s idle, объявлять
# connection dead через ~105s суммарно. Dead connection → kernel шлёт RST →
# TG видит close → открывает fresh connection. Юзеры теряют максимум ~2 мин
# на одном dead-connection'е вместо непредсказуемых 30-60s каждый раз.

net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 3
